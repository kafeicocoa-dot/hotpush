name: HotPush 每日热榜推送

on:
  push:
    branches: [main]
    paths:
      - fetch_and_push.py
      - .github/workflows/hotpush.yml
  schedule:
    # 北京时间 09:00 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
    # 北京时间 12:00 (UTC+8 → UTC 04:00)
    - cron: '0 4 * * *'
    # 北京时间 21:25 (UTC+8 → UTC 13:25)
    - cron: '25 13 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行热榜推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOTPUSH_USERNAME: ${{ secrets.HOTPUSH_USERNAME || 'hotx' }}
          HOTPUSH_PASSWORD: ${{ secrets.HOTPUSH_PASSWORD || '123456' }}
          MAX_ITEMS_PER_SOURCE: '10'
        run: python fetch_and_push.py
