name: HotPush 每日热榜推送

on:
  push:
    branches: [main]
    paths:
      - fetch_and_push.py
      - .github/workflows/hotpush.yml
  schedule:
    # 北京时间 08:06 (UTC+8 → UTC 00:06)
    - cron: '6 0 * * *'
    # 北京时间 08:16 补位触发 (UTC+8 → UTC 00:16)
    - cron: '16 0 * * *'
    # 北京时间 12:06 (UTC+8 → UTC 04:06)
    - cron: '6 4 * * *'
    # 北京时间 12:16 补位触发 (UTC+8 → UTC 04:16)
    - cron: '16 4 * * *'
    # 北京时间 21:06 (UTC+8 → UTC 13:06)
    - cron: '6 13 * * *'
    # 北京时间 21:16 补位触发 (UTC+8 → UTC 13:16)
    - cron: '16 13 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行热榜推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOTPUSH_USERNAME: ${{ secrets.HOTPUSH_USERNAME || 'hotx' }}
          HOTPUSH_PASSWORD: ${{ secrets.HOTPUSH_PASSWORD || '123456' }}
          MAX_ITEMS_PER_SOURCE: '10'
        run: python fetch_and_push.py
