name: HotPush 每日热榜推送

on:
  push:
    branches: [main]
    paths:
      - fetch_and_push.py
      - .github/workflows/hotpush.yml
  schedule:
    # 每 5 分钟触发一次，并对齐到 :01/:06/:11/...，具体是否推送由脚本按北京时间时段判定
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行热榜推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOTPUSH_USERNAME: ${{ secrets.HOTPUSH_USERNAME || 'hotx' }}
          HOTPUSH_PASSWORD: ${{ secrets.HOTPUSH_PASSWORD || '123456' }}
          MAX_ITEMS_PER_SOURCE: '10'
        run: python fetch_and_push.py
